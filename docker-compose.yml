version: '3.8'
services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on: [postgres, redis]
    volumes:
      - ./logs:/app/logs
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: foti_db
      POSTGRES_USER: foti
      POSTGRES_PASSWORD: foti_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
volumes:
  postgres_data:
  redis_data:
